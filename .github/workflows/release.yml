name: Release

# 推送形如 v0.1.0 / v0.1.0-alpha.0 的 tag 时触发，
# 在三平台构建安装包并上传到同一个 draft GitHub Release。
# 也支持手动触发（workflow_dispatch）以便演练。
#
# 架构：先由单个 create-release job 创建（或复用）draft release 拿到
# releaseId，平台 matrix 再以 releaseId 并行上传产物。这样可以避免多个
# 平台 job 同时创建同名 release 造成的竞态（会产生重复 draft / 丢产物）。
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '要创建/更新的 release tag（如 v0.1.0-alpha.0）'
        required: true
        default: 'v0.0.0-dev'

permissions:
  contents: write

jobs:
  create-release:
    name: Create draft release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
      tag_name: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Resolve tag
        id: resolve
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Create or reuse draft release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.resolve.outputs.tag }}';
            const releaseName = `DeepDesk ${tag}`;
            const body = [
              `DeepDesk ${tag} — 非官方 chat.deepseek.com 桌面客户端。`,
              '',
              '> ⚠️ 这是 alpha 阶段的预发布版本，功能仍在快速迭代，可能存在不稳定。',
              '',
              '## 这一版能做什么',
              '- 独立桌面窗口加载 chat.deepseek.com，登录态本地持久化',
              '- 系统托盘常驻：呼出窗口 / 打开官网 / 打开仓库 / 关于 / 退出',
              '- 全局快捷键 `Ctrl/Cmd + Shift + K`：在任意程序中把 DeepDesk 呼到最前',
              '- 断网时显示友好的离线提示页，而非浏览器报错',
              '- 三平台原生安装包，带应用图标',
              '',
              '## 安装',
              '从下方 **Assets** 下载对应平台的安装包：',
              '',
              '| 平台 | 文件 |',
              '| --- | --- |',
              '| Windows | `DeepDesk_*_x64-setup.exe`（推荐）或 `*_x64_en-US.msi` |',
              '| macOS (Apple Silicon) | `DeepDesk_*_aarch64.dmg` |',
              '| macOS (Intel) | `DeepDesk_*_x64.dmg` |',
              '| Linux | `*_amd64.AppImage` / `*_amd64.deb` / `*.x86_64.rpm` |',
              '',
              '### 首次打开提示（重要）',
              '本版本尚未做代码签名，系统可能拦截，这是 alpha 版的正常现象：',
              '- **Windows**：SmartScreen 提示「已保护你的电脑」→ 点「更多信息」→「仍要运行」。',
              '- **macOS**：提示「无法打开，因为来自身份不明的开发者」→ 在「系统设置 › 隐私与安全性」点「仍要打开」，或右键应用选「打开」。',
              '- **Linux (AppImage)**：`chmod +x DeepDesk_*.AppImage` 后运行。',
              '',
              '## 重要声明',
              'DeepDesk 是社区驱动的非官方项目，与 DeepSeek AI 无任何隶属关系。',
              '登录与数据完全走 DeepSeek 官方系统，本应用不收集、不上传任何用户数据，',
              '也不修改、拦截或伪造任何网络请求。',
              '',
              '完整说明见 [README](https://github.com/Ylsssq926/DeepDesk#readme)。',
            ].join('\n');

            // 复用已存在的同名 draft（重跑场景）并刷新标题/正文，否则新建。
            const existing = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const found = existing.data.find((r) => r.tag_name === tag && r.draft);
            if (found) {
              core.info(`Reusing existing draft release ${found.id} for ${tag}; refreshing notes`);
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: found.id,
                name: releaseName,
                body,
                draft: true,
                prerelease: true,
              });
              return found.id;
            }

            const created = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: releaseName,
              body,
              draft: true,
              prerelease: true,
            });
            core.info(`Created draft release ${created.data.id} for ${tag}`);
            return created.data.id;

  build-tauri:
    name: Build (${{ matrix.label }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            label: macOS (Apple Silicon)
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            label: macOS (Intel)
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            label: Linux (x86_64)
            args: ''
          - platform: windows-latest
            label: Windows (x86_64)
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # 仅 macOS runner 需要这两个 target；其他平台留空以略微加速。
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # 不同 target 共享一个 workspace 目录会互相覆盖缓存，按平台+args 区分。
          key: ${{ matrix.platform }}-${{ matrix.args }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl wget file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build injection bundle
        run: pnpm build:inject

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # 上传到 create-release 预建的 draft，避免多平台并发各自建 release。
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
